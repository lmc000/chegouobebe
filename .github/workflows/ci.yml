name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Validate robots.txt sitemap domain
        run: |
          CANONICAL=$(grep -oP '(?<=og:url" content=")[^"]+' public/index.html | head -1)
          SITEMAP_DOMAIN=$(grep -oP '(?<=Sitemap: https://)([^/]+)' public/robots.txt | head -1)
          INDEX_DOMAIN=$(echo "$CANONICAL" | sed 's|https://||' | sed 's|www\.||' | sed 's|/||g')
          SITEMAP_CLEAN=$(echo "$SITEMAP_DOMAIN" | sed 's|www\.||')
          if [ "$SITEMAP_CLEAN" != "$INDEX_DOMAIN" ]; then
            echo "ERROR: robots.txt Sitemap domain ($SITEMAP_DOMAIN) does not match og:url domain ($CANONICAL)"
            exit 1
          fi
          echo "OK: Sitemap domain matches og:url domain ($SITEMAP_DOMAIN)"
