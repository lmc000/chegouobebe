<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0077B6 0%, #0096C7 60%, #48CAE4 100%);
    display: flex; align-items: center; position: relative; overflow: hidden;
  }
  .bg-circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.07); }
  .c1 { width: 500px; height: 500px; top: -100px; right: 160px; }
  .c2 { width: 300px; height: 300px; bottom: -80px; left: 320px; }
  .left { flex: 1; padding: 60px 55px; z-index: 2; display: flex; flex-direction: column; justify-content: center; }
  .domain { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px; }
  .badge { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 16px; font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 600; margin-bottom: 18px; width: fit-content; }
  .titulo { font-size: 48px; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }
  .descricao { font-size: 20px; color: rgba(255,255,255,0.8); font-weight: 400; line-height: 1.45; }
  .right { width: 320px; display: flex; align-items: center; justify-content: center; z-index: 2; flex-shrink: 0; }
  .emoji { font-size: 160px; line-height: 1; filter: drop-shadow(0 8px 30px rgba(0,0,0,0.25)); }
</style>
</head>
<body>
<div class="card">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="left">
    <div class="domain">chegouobebe.com.br</div>
    <div class="badge">✍️ Artigo</div>
    <div class="titulo">{{TITULO}}</div>
    <div class="descricao">{{DESCRICAO}}</div>
  </div>
  <div class="right">
    <div class="emoji">🍼</div>
  </div>
</div>
</body>
</html>
